<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikita's Interactive Portfolio</title>
<style>
  * { box-sizing: border-box; }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
  }

  #game-area {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #cfe8f5;
  }

  /* ============================= SCENE / BACKGROUND ============================= */
  #scene {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 62%;
    background: linear-gradient(to bottom, #6fb3e0 0%, #bfe1f2 70%, #eaf6e6 100%);
  }
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 42%;
    background: linear-gradient(to bottom, #8fc76b 0%, #6ea852 100%);
  }
  .sun {
    position: absolute;
    top: 6%;
    right: 8%;
    width: clamp(40px, 6vw, 80px);
    height: clamp(40px, 6vw, 80px);
    border-radius: 50%;
    background: radial-gradient(circle, #fff6c9 0%, #ffe98a 60%, #ffd85e 100%);
    box-shadow: 0 0 40px 10px rgba(255, 230, 140, 0.6);
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50px;
    filter: blur(0.5px);
    animation: driftCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .cloud1 { width: 8vw; height: 2.5vw; top: 12%; left: -15%; animation-duration: 60s; }
  .cloud1::before { width: 4vw; height: 4vw; top: -2vw; left: 1vw; }
  .cloud1::after { width: 5vw; height: 3vw; top: -1.2vw; left: 4vw; }
  .cloud2 { width: 6vw; height: 2vw; top: 22%; left: -20%; animation-duration: 85s; animation-delay: -20s; }
  .cloud2::before { width: 3vw; height: 3vw; top: -1.5vw; left: 1vw; }
  .cloud2::after { width: 4vw; height: 2.4vw; top: -1vw; left: 3vw; }
  @keyframes driftCloud {
    from { transform: translateX(0); }
    to { transform: translateX(140vw); }
  }

  .river-wrap {
    position: absolute;
    left: 0; right: 0;
    top: 60%;
    height: 9%;
    z-index: 1;
  }
  .river-wrap svg { width: 100%; height: 100%; display: block; }

  .tree {
    position: absolute;
    bottom: 6%;
    width: clamp(50px, 6vw, 90px);
    z-index: 1;
  }
  .tree svg { width: 100%; height: auto; display: block; overflow: visible; }
  .tree .canopy {
    transform-origin: 50% 100%;
    animation: sway 3.2s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2.5deg); }
    50% { transform: rotate(2.5deg); }
  }

  .bird {
    position: absolute;
    width: clamp(18px, 2.4vw, 30px);
    animation: flyAcross linear infinite;
  }
  .bird svg { width: 100%; height: auto; display: block; }
  .bird .wing {
    transform-origin: 50% 50%;
    animation: flap 0.35s ease-in-out infinite alternate;
  }
  @keyframes flap {
    from { transform: scaleY(1); }
    to { transform: scaleY(0.35); }
  }
  @keyframes flyAcross {
    from { transform: translate(-10vw, 0); }
    to { transform: translate(110vw, -4vh); }
  }

  .animal {
    position: absolute;
    bottom: 8%;
    width: clamp(40px, 5vw, 70px);
    left: 30%;
    z-index: 1;
    animation: animalWalk 14s ease-in-out infinite;
  }
  .animal svg { width: 100%; height: auto; display: block; }
  .animal .a-leg {
    transform-origin: 50% 0%;
    animation: walk 0.5s infinite alternate ease-in-out;
  }
  .animal .a-leg2 { animation-delay: 0.25s; }
  @keyframes animalWalk {
    0%   { transform: translateX(0) scaleX(1); }
    48%  { transform: translateX(22vw) scaleX(1); }
    50%  { transform: translateX(22vw) scaleX(-1); }
    98%  { transform: translateX(0) scaleX(-1); }
    100% { transform: translateX(0) scaleX(1); }
  }
  .animal .tail-wag {
    transform-origin: 15% 60%;
    animation: tailWag 0.4s ease-in-out infinite alternate;
  }
  @keyframes tailWag {
    from { transform: rotate(-8deg); }
    to { transform: rotate(10deg); }
  }

  /* Hopping bunny: outer wrapper handles horizontal travel + facing,
     inner wrapper handles the vertical hop so both motions stay independent */
  .bunny-wrap {
    position: absolute;
    bottom: 7%;
    width: clamp(28px, 3.4vw, 46px);
    left: 12%;
    z-index: 1;
    animation: animalWalk 19s ease-in-out infinite;
    animation-delay: -5s;
  }
  .bunny-wrap svg { width: 100%; height: auto; display: block; }
  .hop {
    animation: hopBounce 0.6s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes hopBounce {
    0%   { transform: translateY(0) scaleY(1); }
    15%  { transform: translateY(2px) scaleY(0.85); }
    40%  { transform: translateY(-15px) scaleY(1.08); }
    65%  { transform: translateY(2px) scaleY(0.88); }
    100% { transform: translateY(0) scaleY(1); }
  }

  /* ============================= BUILDINGS ============================= */
  .item {
    position: absolute;
    width: clamp(90px, 13vw, 165px);
    aspect-ratio: 100 / 120;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.25s ease;
  }
  .item svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .item.nearby {
    filter: drop-shadow(0 0 14px rgba(255, 230, 100, 0.9));
    transform: scale(1.05);
  }
  .door {
    transform-box: fill-box;
    transform-origin: left center;
    transition: transform 0.45s ease;
  }
  .item.nearby .door {
    transform: scaleX(0.25) skewY(18deg);
  }

  /* ============================= PLAYER ============================= */
  #player {
    position: absolute;
    width: clamp(46px, 6.5vw, 82px);
    aspect-ratio: 70 / 118;
    z-index: 1000;
  }
  #player svg { width: 100%; height: 100%; display: block; overflow: visible; }
  #player .char {
    transition: transform 0.1s ease;
    transform-origin: center;
  }
  #player .char.facing-left {
    transform: scaleX(-1);
  }
  #player .v-leg-l, #player .v-leg-r {
    transform-origin: 50% 0%;
    animation: walkLegs 0.5s infinite alternate ease-in-out;
    animation-play-state: paused;
  }
  #player .v-leg-r { animation-delay: 0.25s; }
  #player.walking .v-leg-l, #player.walking .v-leg-r {
    animation-play-state: running;
  }
  @keyframes walkLegs {
    from { transform: rotate(-16deg); }
    to { transform: rotate(16deg); }
  }

  /* ============================= UI ============================= */
  #info-dialog {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: clamp(16px, 3vw, 30px);
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    z-index: 2000;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    display: none;
  }
  #info-dialog h1 {
    font-size: clamp(18px, 3vw, 26px);
    margin-bottom: 16px;
    text-align: center;
  }
  #info-content h2 {
    font-size: clamp(15px, 2.2vw, 19px);
    margin-top: 22px;
    margin-bottom: 8px;
    color: #333;
    border-bottom: 2px solid #007acc;
    padding-bottom: 5px;
  }
  #info-content h3 {
    font-size: clamp(13px, 1.8vw, 15px);
    margin-top: 18px;
    margin-bottom: 8px;
    color: #555;
  }
  #info-content p {
    font-size: clamp(13px, 1.8vw, 15px);
    line-height: 1.6;
    margin-bottom: 14px;
    text-align: justify;
  }
  #info-content a {
    color: #4402c7;
    font-size: clamp(13px, 1.8vw, 15px);
    display: inline-block;
    margin-bottom: 14px;
  }
  #info-content ul, #info-content ol {
    padding-left: 20px;
    line-height: 1.6;
    margin-bottom: 14px;
    font-size: clamp(13px, 1.8vw, 15px);
  }
  #close-button {
    position: absolute;
    top: 8px;
    right: 12px;
    border: none;
    background: none;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  #instructions {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(255, 255, 255, 0.9);
    padding: 6px 14px;
    border-radius: 6px;
    z-index: 5;
    font-size: clamp(11px, 1.6vw, 14px);
    text-align: center;
    max-width: 90vw;
  }
  #interaction-hint {
    position: absolute;
    bottom: clamp(70px, 12vh, 90px);
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(0, 122, 204, 0.92);
    color: white;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: clamp(12px, 1.8vw, 14px);
    display: none;
    z-index: 5;
    animation: pulse 1.5s infinite;
    white-space: nowrap;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* ============================= TOUCH CONTROLS ============================= */
  #touch-controls {
    display: none;
    position: absolute;
    bottom: 14px;
    left: 14px;
    z-index: 6;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(2, 48px);
    gap: 4px;
  }
  #touch-controls button {
    border: none;
    border-radius: 8px;
    background: rgba(44, 62, 80, 0.75);
    color: white;
    font-size: 18px;
    touch-action: manipulation;
  }
  #touch-controls button:active { background: rgba(44, 62, 80, 0.95); }
  #btn-up { grid-column: 2; grid-row: 1; }
  #btn-left { grid-column: 1; grid-row: 2; }
  #btn-down { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }

  #btn-interact {
    display: none;
    position: absolute;
    bottom: 24px;
    right: 20px;
    z-index: 6;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: rgba(0, 122, 204, 0.9);
    color: white;
    font-size: 13px;
    font-weight: bold;
    touch-action: manipulation;
  }

  @media (pointer: coarse) {
    #touch-controls { display: grid; }
    #btn-interact { display: block; }
  }
</style>
</head>
<body>

<script>
  /* ============================= PLAYER SVG (chosen style: detailed vector, fuller hair + stylish glasses) ============================= */
  const playerSVG = `
  <svg viewBox="0 0 70 118">
    <defs>
      <radialGradient id="skinGrad" cx="40%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#d99a6c"/>

  /* ============================= DIALOG RENDERING ============================= */
  function showDialog(title, content) {
    const infoTitle = document.getElementById('info-title');
    const infoContent = document.getElementById('info-content');
    infoTitle.textContent = title;
    infoContent.innerHTML = '';

    content.forEach(block => {
      let element;
      switch (block.type) {
        case 'heading2':
          element = document.createElement('h2');
          element.textContent = block.text;
          break;
        case 'heading3':
          element = document.createElement('h3');
          element.textContent = block.text;
          break;
        case 'paragraph':
          element = document.createElement('p');
          element.textContent = block.text;
          break;
        case 'list':
          element = document.createElement('ul');
          block.items.forEach(i => {
            const li = document.createElement('li');
            li.textContent = i;
            element.appendChild(li);
          });
          break;
        case 'ordered_list':
          element = document.createElement('ol');
          block.items.forEach(i => {
            const li = document.createElement('li');
            li.textContent = i;
            element.appendChild(li);
          });
          break;
        case 'link':
          element = document.createElement('a');
          element.href = block.href;
          element.target = '_blank';
          element.rel = 'noopener noreferrer';
          element.textContent = block.text;
          break;
        default:
          element = document.createElement('p');
          element.textContent = block.text || 'Invalid content type';
      }
      infoContent.appendChild(element);
    });

    infoDialog.style.display = 'block';
  }

    if (e.key in keys) { keys[e.key] = true; e.preventDefault(); }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key in keys) { keys[e.key] = false; }
  });

    const btn = document.getElementById(btnId);
    const start = (e) => { e.preventDefault(); keys[key] = true; };

    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('touchend', end);
    btn.addEventListener('touchcancel', end);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', end);
  }

    const maxX = gameArea.offsetWidth - player.offsetWidth;
    const maxY = gameArea.offsetHeight - player.offsetHeight;

    let dx = 0, dy = 0;
    if (keys.ArrowLeft) dx -= 1;
    if (keys.ArrowRight) dx += 1;
    if (keys.ArrowUp) dy -= 1;
    if (keys.ArrowDown) dy += 1;

    const moving = dx !== 0 || dy !== 0;

    if (moving) {
      // normalize so diagonal movement isn't faster
      const len = Math.hypot(dx, dy) || 1;
      playerX = Math.min(maxX, Math.max(0, playerX + (dx / len) * speed));
      playerY = Math.min(maxY, Math.max(0, playerY + (dy / len) * speed));

      if (dx < 0) facing = 'left';
      else if (dx > 0) facing = 'right';
    }

    player.classList.toggle('walking', moving);
    const charGroup = player.querySelector('.char');
    if (charGroup) charGroup.classList.toggle('facing-left', facing === 'left');

    player.style.left = playerX + 'px';
    player.style.top = playerY + 'px';

    updateProximity();
    requestAnimationFrame(gameLoop);
  }

  function updateProximity() {
    const playerRect = player.getBoundingClientRect();
    const playerCenterX = playerRect.left + playerRect.width / 2;
    const playerCenterY = playerRect.top + playerRect.height / 2;

    let found = null;
    items.forEach(item => {
      const r = item._el.getBoundingClientRect();
      const dist = Math.hypot(
        playerCenterX - (r.left + r.width / 2),
        playerCenterY - (r.top + r.height / 2)
      );
      const threshold = Math.max(90, r.width * 0.7);
      if (dist < threshold) {
        found = item;
        item._el.classList.add('nearby');
      } else {
        item._el.classList.remove('nearby');
      }
    });

    nearbyItem = found;
    interactionHint.style.display = nearbyItem ? 'block' : 'none';
  }

  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
